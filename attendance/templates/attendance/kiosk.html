<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Terminal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body {
    background: radial-gradient(circle at top, #1e293b, #020617);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Inter", sans-serif;
}

.kiosk-card {
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(10px);
    border-radius: 22px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    padding: 42px;
    width: 100%;
    max-width: 500px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.header h2 {
    font-size: 20px;
    font-weight: 600;
}

.status {
    font-size: 13px;
    color: #64748b;
}

.status span {
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%,100% {opacity:1;}
    50% {opacity:0.4;}
}

.time-box {
    text-align: center;
    margin: 30px 0;
}

.time-main {
    font-size: 68px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #020617;
}

.seconds {
    font-size: 22px;
    color: #94a3b8;
    margin-left: 6px;
}

.date {
    font-size: 14px;
    color: #64748b;
    margin-top: 8px;
}

.form-control {
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    padding: 13px;
    background: #f8fafc;
}

.form-control:focus {
    background: #fff;
    border-color: #020617;
    box-shadow: none;
}

.actions {
    display: flex;
    gap: 10px;
    margin: 20px 0;
}

.action {
    flex: 1;
    border-radius: 999px;
    padding: 13px;
    border: 1px solid #e2e8f0;
    cursor: pointer;
    transition: all 0.25s ease;
    font-weight: 500;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;

    background: #f8fafc;
}

.action i {
    font-size: 18px;
    opacity: 0.7;
}

.action.check-in:hover {
    background: #ecfdf5;
}

.action.check-out:hover {
    background: #fef2f2;
}

/* ACTIVE STATES */
.action.check-in:has(input:checked) {
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: white;
    border: none;
    box-shadow: 0 8px 20px rgba(34,197,94,0.25);
}

.action.check-out:has(input:checked) {
    background: linear-gradient(135deg, #dc2626, #f97316);
    color: white;
    border: none;
    box-shadow: 0 8px 20px rgba(239,68,68,0.25);
}

.action:has(input:checked) {
    transform: scale(1.03);
}

.action input {
    display: none;
}

.submit-btn {
    width: 100%;
    padding: 15px;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, #020617, #1e293b);
    color: white;
    font-weight: 600;
    transition: 0.2s ease;
}

.submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.admin {
    text-align: center;
    margin-top: 20px;
}

.admin a {
    font-size: 13px;
    color: #94a3b8;
    text-decoration: none;
}

.admin a:hover {
    color: #020617;
}

@media(max-width:576px){
    .kiosk-card {padding: 25px;}
    .time-main {font-size: 52px;}
    .actions {flex-direction: column;}
}
</style>
</head>

<body>

<div class="kiosk-card">

    <div class="header">
        <h2>Attendance Terminal</h2>
        <div class="status"><span></span>Live</div>
    </div>

    <div class="time-box">
        <div class="time-main" id="clock">
            --:-- <span class="seconds">--</span>
        </div>
        <div class="date" id="date"></div>
    </div>

    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}

    <form method="POST" id="form">
        {% csrf_token %}

        <input type="email" name="email" id="email"
               class="form-control"
               placeholder="Enter work email"
               required>

        <div class="actions">
            <label class="action check-in">
                <input type="radio" name="action" value="check_in" checked>
                <i class="bi bi-box-arrow-in-right"></i>
                <span>Check In</span>
            </label>

            <label class="action check-out">
                <input type="radio" name="action" value="check_out">
                <i class="bi bi-box-arrow-right"></i>
                <span>Check Out</span>
            </label>
        </div>

        <button class="submit-btn">Confirm</button>
    </form>

    <!-- <div class="admin">
        <a href="{% url 'login' %}">Admin Access</a>
    </div> -->

</div>

<script>
(function(){
    function updateClock(){
        const now = new Date();

        let h = now.getHours();
        let m = String(now.getMinutes()).padStart(2,'0');
        let s = String(now.getSeconds()).padStart(2,'0');

        h = h % 12 || 12;

        document.getElementById("clock").innerHTML =
            `${String(h).padStart(2,'0')}:${m} <span class="seconds">${s}</span>`;

        document.getElementById("date").innerText =
            now.toDateString();
    }

    updateClock();
    setInterval(updateClock,1000);

    document.getElementById("email").focus();

    document.getElementById("form").addEventListener("submit", function(){
        const btn = this.querySelector(".submit-btn");
        btn.disabled = true;
        btn.innerText = "Processing...";
    });
})();
</script>

</body>
</html>
