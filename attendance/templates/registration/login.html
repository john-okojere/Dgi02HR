<!-- attendance/templates/registration/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
            border-radius: 22px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.35);
            border: 1px solid rgba(148,163,184,0.35);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header i {
            font-size: 48px;
            color: #020617;
        }
        .btn-login {
            background: linear-gradient(135deg, #020617, #1e293b);
            border: 1px solid #020617;
            padding: 12px;
            font-weight: 500;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #0b1220, #26364f);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-shield-lock"></i>
            <h4 class="mt-3">HR Management System</h4>
            <p class="text-muted">Please sign in to continue</p>
        </div>
        
        {% if form.errors %}
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle"></i> Invalid username or password.
        </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="{% url 'kiosk' %}" class="text-muted small">
                <i class="bi bi-qr-code"></i> Go to Kiosk
            </a>
        </div>
    </div>
</body>
</html>
